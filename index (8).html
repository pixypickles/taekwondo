<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Taekwondo v2.002</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#172434;touch-action:none;font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}canvas{display:block;width:100vw;height:100vh}

#controls{position:fixed;left:0;right:0;bottom:max(12px,env(safe-area-inset-bottom));height:172px;z-index:10;pointer-events:none}button{position:absolute;width:66px;height:66px;border-radius:50%;border:3px solid #ffffff78;background:#ffffff33;color:white;font-size:28px;font-weight:900;pointer-events:auto;user-select:none;-webkit-tap-highlight-color:transparent}button.down,button:active{transform:scale(.94);background:#ffffff5c}.up{left:96px;bottom:96px}.left{left:24px;bottom:28px}.rotate{left:96px;bottom:28px;background:#bea84673}.right{left:168px;bottom:28px}.small{right:184px;bottom:28px;background:#1e87ff7a}.big{right:106px;bottom:28px;background:#ff465080}.guard{right:28px;bottom:28px;background:#1e232db8}

</style></head><body><canvas id="game"></canvas>
<div id="bars"><div id="pLabel">PLAYER</div><div id="eLabel">CPU</div><div class="bar l"><div id="pHp" class="hp"></div></div><div class="bar r"><div id="eHp" class="hp"></div></div><div class="bar balbar l"><div id="pBal" class="bal"></div></div><div class="bar balbar r"><div id="eBal" class="bal"></div></div></div>
<div id="hud"><div id="move">構え</div><div id="state"></div><div id="debug">v2.002 / 回転・ヤンバル・ターン修正</div></div>
<div id="controls"><button class="up" data-b="up">↑</button><button class="left" data-b="left">←</button><button class="rotate" data-b="rotate">回</button><button class="right" data-b="right">→</button><button class="small" data-b="small">小</button><button class="big" data-b="big">大</button><button class="guard" data-b="guard">G</button></div>
<script>
(()=>{const cvs=document.getElementById("game"),ctx=cvs.getContext("2d");let W,H,D=devicePixelRatio||1;function rz(){W=innerWidth;H=innerHeight;D=devicePixelRatio||1;cvs.width=W*D;cvs.height=H*D;ctx.setTransform(D,0,0,D,0,0)}addEventListener("resize",rz);rz();
const M={
 idle:["構え",1],ap:["アプチャギ",.34,5,105,-10,18],dol:["トルリョチャギ",.42,8,125,-35,30],putcho:["プッチョ",.25,4,112,-35,14],yanbal:["ヤンバルチャギ",.46,9,122,-34,24],milgi:["押し蹴り",.39,3,148,-18,92],
 rot:["回転フェイント",.47],dwit:["ティッチャギ",.41,12,160,-62,46],huri:["ティフリギ",.47,14,145,-95,54],turn:["ターンチャギ",.70,20,165,-48,84],
 na:["ネリョチャギ",.47,10,112,-35,24],jumpHuri:["跳びティフリギ",.58,17,150,-88,70],retDol:["下がりトルリョチャギ",.47,7,125,-35,28],retDwit:["下がり跳びティッチャギ",.54,12,160,-62,48]};
const K={down:new Set(),ev:[],tap:{}};function press(b){let n=performance.now();if(K.down.has(b))return;K.down.add(b);K.ev.push(["p",b,n]);if(b=="left"||b=="right"){if(n-(K.tap[b]||0)<260)K.ev.push(["d",b,n]);K.tap[b]=n}}function rel(b){K.down.delete(b)}function down(b){return K.down.has(b)}
document.querySelectorAll("[data-b]").forEach(e=>{let b=e.dataset.b;e.addEventListener("pointerdown",x=>{x.preventDefault();e.classList.add("down");press(b)},{passive:false});let u=x=>{x.preventDefault();e.classList.remove("down");rel(b)};e.addEventListener("pointerup",u,{passive:false});e.addEventListener("pointercancel",u,{passive:false});e.addEventListener("pointerleave",u,{passive:false})});
const mp={ArrowUp:"up",ArrowLeft:"left",ArrowRight:"right",ArrowDown:"rotate",z:"small",x:"big",c:"guard",Z:"small",X:"big",C:"guard"};addEventListener("keydown",e=>{if(e.key=="r"||e.key=="R"){K.ev.push(["reset"]);return}let b=mp[e.key];if(b){e.preventDefault();press(b)}});addEventListener("keyup",e=>{let b=mp[e.key];if(b){e.preventDefault();rel(b)}});
function F(x,f,c,p){return{x,y:H*.5,f,c,p,hp:100,bal:100,id:"idle",t:0,guard:false,stun:0,ko:false,flash:0,last:"",spinReady:0,spinBonus:0,spinText:0,rotBuf:0,turnReady:0,turnDir:.45,smallBuf:0,pushReady:0,step:0,stepDir:0,cd:.5,counter:.0}}
let P=F(W*.3,1,"#1594ff",1),E=F(W*.7,-1,"#ff3a48",0),hitStop=0,round=0,restart=0,pw=0,ew=0;
function reset(full=0){P=F(W*.3,1,"#1594ff",1);E=F(W*.7,-1,"#ff3a48",0);hitStop=round=restart=0;if(full){pw=ew=0}mv("idle")}
function start(u,id){u.id=id;u.t=0;u.last="";if(u.p)mv(id)}function mv(id){document.getElementById("move").textContent=M[id][0]}
function prog(u){return Math.min(1,u.t/M[u.id][1])}
function handle(dt){P.guard=down("guard")&&P.id=="idle"&&P.stun<=0;["spinReady","spinText","rotBuf","turnReady","smallBuf","pushReady","step"].forEach(k=>P[k]=Math.max(0,P[k]-dt));let ev=K.ev.splice(0);for(let e of ev){let ty=e[0],b=e[1];if(ty=="reset"){reset(1);continue}if(ty=="d"&&b=="right"){P.step=.32;P.stepDir=1;P.x+=40;continue}if(ty=="d"&&b=="left"){P.step=.32;P.stepDir=-1;P.x-=40;continue}if(ty!="p"||P.stun>0||P.ko)continue;let fw=down("right"),bk=down("left"),up=down("up");
 if((b=="guard"&&fw)||(b=="right"&&down("guard")))P.pushReady=.95;
 if(b=="big"&&P.turnReady>0){P.turnDir=bk?0:(fw?1:.45);P.spinBonus=P.spinReady>0?1:0;if(P.spinBonus)P.spinText=.55;start(P,"turn");continue}
 if((P.id=="rot"||P.spinReady>0)&&b=="small"){P.spinBonus=P.spinReady>0?1:0;if(P.spinBonus)P.spinText=.55;start(P,"dwit");continue}
 if((P.id=="rot"||P.spinReady>0)&&b=="big"){P.spinBonus=P.spinReady>0?1:0;if(P.spinBonus)P.spinText=.55;start(P,"huri");continue}
 if(b=="rotate"){if(P.rotBuf>0||P.id=="rot"){P.turnReady=.95;P.spinReady=.25;P.spinText=.45}P.rotBuf=.58;start(P,"rot");continue}
 if((b=="small"||b=="big")&&(P.pushReady>0||(down("guard")&&(fw||(P.step>0&&P.stepDir==1))))){P.pushReady=0;start(P,"milgi");continue}
 if(b=="small"&&P.smallBuf>0){P.smallBuf=0;start(P,"yanbal");continue}
 if(b=="small"&&up){start(P,"na");continue} if(b=="big"&&up){start(P,"jumpHuri");continue}
 if(b=="small"&&(fw||(P.step>0&&P.stepDir==1))){P.smallBuf=.58;start(P,"putcho");continue}
 if(b=="small"&&bk){start(P,"retDol");continue} if(b=="big"&&bk){start(P,"retDwit");continue}
 if(b=="small"){P.smallBuf=.58;start(P,"ap");continue} if(b=="big"){start(P,"dol");continue}
}}
function updPlayer(dt){if(P.stun>0){P.stun=Math.max(0,P.stun-dt);return}if(P.id=="idle"){if(down("left"))P.x-=160*dt;if(down("right"))P.x+=160*dt}else{if(["rot","dwit","huri"].includes(P.id)){if(down("right"))P.x+=90*dt;if(down("left"))P.x-=90*dt}if(P.id=="turn")P.x+=135*dt*P.turnDir;P.t+=dt;if(P.id=="rot"){let p=prog(P);if(p>.76&&p<.96)P.spinReady=down("right")?.22:.16}hit(P,E);if(P.t>M[P.id][1])start(P,"idle")}P.x=Math.max(60,Math.min(W-60,P.x))}
function ai(dt){if(E.ko)return;if(E.stun>0){E.stun=Math.max(0,E.stun-dt);E.guard=false;return}if(E.id!="idle"){E.t+=dt;hit(E,P);if(E.t>M[E.id][1]){start(E,"idle");E.cd=.35+Math.random()*.45}return}E.cd=Math.max(0,E.cd-dt);let dist=E.x-P.x;E.guard=false;if(P.id!="idle"&&prog(P)<.58&&Math.random()<.028)E.guard=true;if(dist>270)E.x-=105*dt;else if(dist<145)E.x+=115*dt;else if(E.cd<=0){let r=Math.random();start(E,dist<175&&r<.24?"putcho":dist<175&&r<.38?"yanbal":dist<230&&r<.62?"milgi":r<.80?"ap":r<.94?"dol":"na")}E.x=Math.max(W*.18,Math.min(W-70,E.x))}
function guarding(u){return u.guard&&u.id=="idle"&&u.stun<=0}
function dmg(a,t,m){let d=m[2]||0,spin=a.p&&a.spinBonus;if(spin)d=Math.ceil(d*1.2);if(guarding(t)){d=Math.ceil(d*.25);a.bal=Math.max(0,a.bal-((m[2]||0)>11?24:8));if((m[2]||0)>11){a.stun=spin?.62:.42;t.counter=.8}}else t.bal=Math.max(0,t.bal-(m[2]||5)-(spin?10:0));let kb=(m[5]||20)+(spin?18:0);if(t.f<0)t.x+=kb;else t.x-=kb;t.hp=Math.max(0,t.hp-d);t.flash=.18;hitStop=spin?.065:.03;if(t.bal<=0){t.stun=1;t.bal=45}if(t.hp<=0&&!t.ko){t.ko=true;round=1.5;restart=2.2;t.p?ew++:pw++}}
function hit(a,t){let m=M[a.id];if(!m[2])return;let p=prog(a),key=a.id+(a.id=="yanbal"?(p<.5?"_1":"_2"):"");if(a.last==key)return;if(p<.35||p>.78)return;let hx=a.x+a.f*m[3],hy=a.y+m[4],tx=t.x-t.f*28,ty=t.y-70;if(Math.abs(hx-tx)<68&&Math.abs(hy-ty)<78){dmg(a,t,m);a.last=key;if(a.p)a.spinBonus=0}}
function line(x1,y1,x2,y2,w,c,a=1){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=c;ctx.lineWidth=w;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function ell(x,y,rx,ry,s,e,a=.4){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle="white";ctx.lineWidth=12;ctx.lineCap="round";ctx.beginPath();ctx.ellipse(x,y,rx,ry,-.2,s,e);ctx.stroke();ctx.restore()}
function trail(u,x,y){let id=u.id,f=u.f;if(["rot","dwit","huri","turn","jumpHuri"].includes(id))ell(x,y-20,60,20,Math.PI*1.05,Math.PI*1.85,.3);if(id=="huri"||id=="jumpHuri")ell(x+f*145,y-72,95,44,f>0?Math.PI*1.08:-.08,f>0?Math.PI*1.88:Math.PI*.92,.48);if(id=="turn")ell(x+f*150,y-48,128,48,f>0?Math.PI*1.02:-.02,f>0?Math.PI*1.92:Math.PI*.98,.50);if(id=="dwit"||id=="retDwit")line(x+f*20,y-35,x+f*170,y-65,12,"white",.4);if(id=="milgi"){line(x+f*126,y-50,x+f*126,y+10,10,"white",.32);line(x+f*98,y-34,x+f*126,y-34,6,"white",.22)}if(["putcho","yanbal"].includes(id))ell(x+f*50,y-12,50,30,f>0?-.6:Math.PI+.6,f>0?.2:Math.PI-.2,.35);if(id=="na")ell(x+f*50,y-40,98,98,f>0?-1.55:Math.PI+1.55,f>0?.65:Math.PI-.65,.35)}
function fighter(u){let p=prog(u),x=u.x,y=u.y,f=u.f,c=u.flash>0?"#fff":u.guard?"#9fd8ff":u.c,pose=u.id;if(pose=="rot"){y-=10*Math.sin(Math.PI*p*2)}let g=y+118,head={x,y:y-100},top={x,y:y-62},hip={x,y:y+5},fh={x:x+f*48,y:y-42},rh={x:x-f*38,y:y-22},fa={x:x-f*36,y:g},fb={x:x+f*58,y:g},ka={x:x-f*18,y:y+56},kb={x:x+f*35,y:y+56};
 if(pose=="milgi"){kb={x:x+f*78,y:y-18};fb={x:x+f*150,y:y-18};top.x-=f*8;hip.x-=f*12}
 else if(pose=="putcho"){kb={x:x+f*55,y:y-14};fb={x:x+f*118,y:y-38}}
 else if(pose=="yanbal"){
   if(p<.48){
     // 1発目：前足
     kb={x:x+f*55,y:y-14};fb={x:x+f*118,y:y-38}
   }else{
     // 2発目：逆足。後ろ足側を蹴り足にして見た目を分ける
     ka={x:x+f*58,y:y-10};fa={x:x+f*132,y:y-36};
     kb={x:x+f*18,y:y+56};fb={x:x-f*20,y:g}
   }
 }
 else if(["dwit","retDwit"].includes(pose)){head.x=x-f*24;top.x=x-f*10;hip.x=x-f*8;kb={x:x+f*70,y:y-34};fb={x:x+f*160,y:y-62};fa={x:x-f*6,y:g}}
 else if(pose=="huri"||pose=="jumpHuri"){head.x=x-f*22;top.x=x-f*10;hip.x=x-f*6;kb={x:x+f*96,y:y-72};fb={x:x+f*130,y:y-110};fa={x:x-f*8,y:g}}
 else if(pose=="turn"){head.x=x-f*18;top.x=x-f*10;hip.x=x-f*8;kb={x:x+f*92,y:y-35};fb={x:x+f*165,y:y-48};fa={x:x-f*8,y:g}}
 else if(pose=="na"){kb={x:x+f*70,y:y-50};fb={x:x+f*105,y:y-105+130*p}}
 else if(pose=="dol"||pose=="retDol"){kb={x:x+f*60,y:y-10};fb={x:x+f*135,y:y-35}}
 else if(pose=="ap"){kb={x:x+f*58,y:y-5};fb={x:x+f*125,y:y-10}}
 else if(pose=="rot"){
  if(p<.28){fa={x:x-f*8,y:g-22};fb={x:x+f*10,y:g-22};ka={x:x-f*6,y:y+58};kb={x:x+f*8,y:y+58}}
  else if(p<.55){fa={x:x+f*22,y:g-4};fb={x:x-f*38,y:g-4};ka={x:x+f*16,y:y+56};kb={x:x-f*24,y:y+56};head.x=x-f*8}
  else if(p<.78){fa={x:x-f*8,y:g-22};fb={x:x+f*10,y:g-22};ka={x:x-f*6,y:y+58};kb={x:x+f*8,y:y+58}}
  else {fa={x:x-f*36,y:g};fb={x:x+f*58,y:g}}
}
 trail(u,x,y); if(u.guard){ctx.save();ctx.strokeStyle="#9fd8ff";ctx.globalAlpha=.55;ctx.lineWidth=5;ctx.beginPath();ctx.arc(x+f*42,y-45,42,f>0?2.1:-1.1,f>0?4.2:1.1);ctx.stroke();ctx.restore()}
 line(top.x,top.y,hip.x,hip.y,22,c);line(top.x,top.y,fh.x,fh.y,14,c);line(top.x,top.y+8,rh.x,rh.y,14,c);line(hip.x,hip.y,ka.x,ka.y,18,c);line(ka.x,ka.y,fa.x,fa.y,18,c);line(hip.x,hip.y,kb.x,kb.y,18,c);line(kb.x,kb.y,fb.x,fb.y,18,c);line(fa.x-f*12,fa.y+2,fa.x+f*18,fa.y+2,12,"#07101f");
 if(pose=="milgi"){line(fb.x+f*4,fb.y-30,fb.x+f*4,fb.y+30,18,"#07101f")}else line(fb.x-f*12,fb.y+2,fb.x+f*18,fb.y+2,12,"#07101f");
 ctx.fillStyle="#ffd2b0";ctx.beginPath();ctx.arc(fh.x,fh.y,12,0,7);ctx.fill();ctx.beginPath();ctx.arc(rh.x,rh.y,12,0,7);ctx.fill();ctx.fillStyle="#ffc59f";ctx.beginPath();ctx.arc(head.x,head.y,28,0,7);ctx.fill();ctx.fillStyle="#111";ctx.beginPath();ctx.arc(head.x+f*10,head.y-5,5,0,7);ctx.fill();if(u.flash>0){line(x+f*24,y-90,x+f*60,y-60,4,"white",.9);line(x+f*60,y-90,x+f*24,y-60,4,"white",.9)}}
function draw(){ctx.fillStyle="#182536";ctx.fillRect(0,0,W,H);ctx.fillStyle="#2c3b49";ctx.fillRect(0,H*.47,W,H*.53);line(0,H*.79,W,H*.79,3,"#ffffff55");fighter(E);fighter(P);if(round>0||P.ko||E.ko){ctx.save();ctx.textAlign="center";ctx.fillStyle="white";ctx.font="900 54px system-ui";ctx.fillText(P.ko?"YOU LOSE":"K.O.",W/2,H*.34);ctx.font="900 18px system-ui";ctx.fillText("NEXT ROUND...",W/2,H*.34+36);ctx.fillText("PLAYER "+pw+" - "+ew+" CPU",W/2,H*.34+62);ctx.restore()}}
function hud(){pHp.style.width=P.hp+"%";eHp.style.width=E.hp+"%";pBal.style.width=P.bal+"%";eBal.style.width=E.bal+"%";let s=state;if(P.spinText>0)s.textContent=P.turnReady>0?"TURN READY":"SPIN BONUS!";else if(P.turnReady>0)s.textContent="TURN READY";else if(P.spinReady>0&&P.id=="rot")s.textContent="SPIN READY";else if(P.pushReady>0)s.textContent="PUSH READY";else if(P.smallBuf>0)s.textContent="2nd SMALL READY";else s.textContent=""}
function roundUpd(dt){if(P.ko||E.ko){round=Math.max(0,round-dt);restart=Math.max(0,restart-dt);if(restart<=0){P.reset(W*.3);E.reset(W*.7);round=hitStop=0;mv("idle")}return true}return false}
let last=performance.now();function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;P.y=E.y=H*.5;if(hitStop>0){hitStop=Math.max(0,hitStop-dt);hud();draw();requestAnimationFrame(loop);return}if(!roundUpd(dt)){handle(dt);updPlayer(dt);ai(dt);hit(E,P);P.flash=Math.max(0,P.flash-dt);E.flash=Math.max(0,E.flash-dt)}hud();draw();requestAnimationFrame(loop)}reset(1);requestAnimationFrame(loop);
})();
</script></body></html>
