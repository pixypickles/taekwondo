<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Taekwondo Prototype Source v001</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="moveName">構え</div>
    <div id="debug">v001 source build</div>
  </div>

  <div id="controls">
    <button data-btn="up" class="dir up">↑</button>
    <button data-btn="left" class="dir left">←</button>
    <button data-btn="rotate" class="dir rotate">回</button>
    <button data-btn="right" class="dir right">→</button>

    <button data-btn="small" class="act small">小</button>
    <button data-btn="big" class="act big">大</button>
    <button data-btn="guard" class="act guard">G</button>
  </div>

  <script type="module" src="./js/game.js"></script>
</body>
</html>
