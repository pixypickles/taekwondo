<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Taekwondo v009 Refactor</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="bars">
    <div id="pLabel">PLAYER</div><div id="eLabel">CPU</div>
    <div id="pHpWrap" class="barWrap"><div id="pHp" class="hp"></div></div>
    <div id="eHpWrap" class="barWrap"><div id="eHp" class="hp"></div></div>
    <div id="pBalWrap" class="balWrap"><div id="pBal" class="bal"></div></div>
    <div id="eBalWrap" class="balWrap"><div id="eBal" class="bal"></div></div>
  </div>

  <div id="hud">
    <div id="moveName">構え</div>
    <div id="spinText"></div>
    <div id="debug">v009 refactor / プッチョ・押し蹴り追加</div>
  </div>

  <div id="controls">
    <button class="up" data-btn="up">↑</button>
    <button class="left" data-btn="left">←</button>
    <button class="rotate" data-btn="rotate">回</button>
    <button class="right" data-btn="right">→</button>
    <button class="small" data-btn="small">小</button>
    <button class="big" data-btn="big">大</button>
    <button class="guard" data-btn="guard">G</button>
  </div>

  <script src="./js/moves.js"></script>
  <script src="./js/input.js"></script>
  <script src="./js/entities.js"></script>
  <script src="./js/effects.js"></script>
  <script src="./js/collision.js"></script>
  <script src="./js/cpu.js"></script>
  <script src="./js/render.js"></script>
  <script src="./js/game.js"></script>
</body>
</html>
