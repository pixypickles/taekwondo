<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Taekwondo Game</title>
<style>
html,body{margin:0;height:100%;background:#111;overflow:hidden;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;touch-action:none}#wrap{position:fixed;inset:0;background:#111;display:flex;align-items:center;justify-content:center}canvas{width:100vw;height:auto;max-height:100vh;background:#8dd7ff}#pad{position:fixed;inset:0;pointer-events:none}.dpad,.actions{position:absolute;bottom:18px;pointer-events:auto}.dpad{left:18px;width:176px;height:176px}.actions{right:18px;width:250px;height:178px}button{position:absolute;border:0;border-radius:999px;color:white;font-weight:900;font-size:28px;background:#222c;box-shadow:0 5px 0 #0008,inset 0 0 0 3px #fff3;touch-action:none;-webkit-tap-highlight-color:transparent}.dpad button{width:70px;height:70px}.up{left:53px;top:0}.left{left:0;top:53px}.right{right:0;top:53px}.down{left:53px;bottom:0;background:#d1a500dd}.actions button{width:78px;height:78px}.small{left:0;top:38px;background:#086bd6dd}.big{left:86px;top:22px;background:#c52828dd}.guard{right:0;bottom:12px;width:94px!important;height:94px!important;font-size:20px;background:#333d}.hit{transform:translateY(4px);box-shadow:0 1px 0 #0008,inset 0 0 0 3px #fff8}.notice{position:fixed;top:8px;left:8px;color:#fff;background:#0008;padding:6px 10px;border-radius:8px;font-size:13px}@media(max-width:720px){.dpad{transform:scale(.82);transform-origin:left bottom}.actions{transform:scale(.82);transform-origin:right bottom}.notice{font-size:11px}}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
<div class="notice">読込OK：スマホは画面ボタン / PCは矢印・Z・X・C</div>
<div id="pad"><div class="dpad"><button class="up" data-k="up">▲</button><button class="left" data-k="left">◀</button><button class="right" data-k="right">▶</button><button class="down" data-k="down">▼</button></div><div class="actions"><button class="small" data-k="small">小</button><button class="big" data-k="big">大</button><button class="guard" data-k="guard">ガード</button></div></div>
<script>
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const key={left:0,right:0,up:0,down:0,small:0,big:0,guard:0},tap={left:-99,right:-99},press={};let frame=0;
function set(k,v){key[k]=v?1:0;document.querySelectorAll('[data-k="'+k+'"]').forEach(b=>b.classList.toggle('hit',!!v));if(v){press[k]=1;if(k==='left'||k==='right'){if(frame-tap[k]<18)press[k+'2']=1;tap[k]=frame;}}}
const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',z:'small',Z:'small',x:'big',X:'big',c:'guard',C:'guard'};
addEventListener('keydown',e=>{if(map[e.key]){e.preventDefault();if(!key[map[e.key]])set(map[e.key],1);}});addEventListener('keyup',e=>{if(map[e.key]){e.preventDefault();set(map[e.key],0);}});
document.querySelectorAll('button[data-k]').forEach(b=>{let k=b.dataset.k;b.addEventListener('pointerdown',e=>{e.preventDefault();try{b.setPointerCapture(e.pointerId)}catch(_){}set(k,1)});b.addEventListener('pointerup',e=>{e.preventDefault();set(k,0)});b.addEventListener('pointercancel',()=>set(k,0));b.addEventListener('contextmenu',e=>e.preventDefault());});
const M={small:['小キック',45,95,6,8,14],big:['大キック',75,125,10,10,20],naeryo:['ネリョチャギ',70,115,12,10,22],jump:['跳び後ろ回し蹴り',105,145,17,12,30],bs:['下がりトルリョチャギ',55,105,9,8,19,1],bb:['下がり跳びティッチャギ',90,135,15,10,27,1],dwit:['ティッチャギ（後ろ蹴り）',90,135,8,8,22],dwi:['ティフリギ（後ろ回し蹴り）',120,155,13,10,34]};
class F{constructor(x,c,n){this.x=x;this.y=415;this.c=c;this.n=n;this.hp=1000;this.bal=100;this.f=1;this.s='idle';this.t=0;this.m=null;this.done=0;this.flash=0;this.msg='';this.ai=0;}act(s,t){this.s=s;this.t=t;this.done=0;}atk(m){if(this.s==='attack')return;this.m=m;this.bal=Math.max(0,this.bal-(m[1]/8));this.act('attack',m[3]+m[4]+m[5]);this.msg=m[0];}active(){if(this.s!=='attack'||!this.m)return false;let total=this.m[3]+this.m[4]+this.m[5],p=total-this.t;return p>=this.m[3]&&p<this.m[3]+this.m[4];}input(o,player){this.f=this.x<o.x?1:-1;let vx=0;if(this.flash>0)this.flash--;if(this.s!=='idle'){this.t--;if(this.s==='step')vx=9*this.f;if(this.s==='back')vx=-9*this.f;if(this.s==='attack'&&this.m&&this.m[6])vx=-3.2*this.f;if(this.t<=0){this.s='idle';this.m=null;this.msg='';}}
if(player)this.pin();else this.cpu(o);if(this.s==='idle'){if(player){if(key.left)vx=-3.2;if(key.right)vx=3.2;}this.bal=Math.min(100,this.bal+.08);}this.x=Math.max(70,Math.min(890,this.x+vx));}
pin(){let fw=this.f>0?'right':'left',bk=this.f>0?'left':'right';if(this.s==='idle'){if(press[fw+'2'])this.act('step',13);else if(press[bk+'2'])this.act('back',15);else if(key.guard)this.act('guard',3);else if(press.down)this.act('rotate',28);else if(press.small)this.atk(key.up?M.naeryo:key[bk]?M.bs:M.small);else if(press.big)this.atk(key.up?M.jump:key[bk]?M.bb:M.big);}else if(this.s==='rotate'){if(press.small)this.atk(M.dwit);else if(press.big)this.atk(M.dwi);}}
cpu(o){this.ai--;let d=Math.abs(this.x-o.x);if(this.s==='idle'&&this.ai<=0){this.ai=20+Math.random()*35;if(d>190)this.act('step',13);else if(d<80)this.act('back',15);else{let r=Math.random();if(r<.2)this.act('guard',10);else if(r<.35)this.act('rotate',26);else if(r<.65)this.atk(M.small);else this.atk(M.big);}}else if(this.s==='rotate'&&Math.random()<.09)this.atk(Math.random()<.55?M.dwit:M.dwi);}
draw(){ctx.save();ctx.translate(this.x,this.y);ctx.scale(this.f,1);if(this.flash)ctx.globalAlpha=.55;ctx.rotate(this.s==='rotate'?Math.sin(frame*.7)*.35:0);ctx.lineWidth=7;ctx.lineCap='round';ctx.strokeStyle='#161616';ctx.fillStyle=this.c;ctx.fillRect(-28,-118,56,78);ctx.strokeRect(-28,-118,56,78);ctx.fillStyle='#111';ctx.fillRect(-36,-49,72,11);ctx.fillStyle='#f0c59e';ctx.beginPath();ctx.arc(0,-148,25,0,7);ctx.fill();ctx.stroke();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(8,-151,3.5,0,7);ctx.fill();ctx.beginPath();ctx.moveTo(-8,-136);ctx.lineTo(9,-136);ctx.stroke();ctx.beginPath();ctx.moveTo(-25,-96);ctx.lineTo(-52,-76);ctx.lineTo(-39,-58);ctx.moveTo(25,-96);ctx.lineTo(52,-76);ctx.lineTo(39,-58);ctx.stroke();let k=0,hi=0;if(this.s==='attack'&&this.m){let total=this.m[3]+this.m[4]+this.m[5],p=(total-this.t)/total;k=Math.sin(Math.min(1,p*1.6)*Math.PI);hi=(this.m===M.naeryo||this.m===M.jump||this.m===M.dwi)?35:0;}ctx.beginPath();ctx.moveTo(-16,-40);ctx.lineTo(-34,0);ctx.lineTo(-42,28);ctx.moveTo(16,-40);ctx.lineTo(34+k*70,-4-k*(35+hi));ctx.lineTo(54+k*((this.m&&this.m[2])||70),20-k*(58+hi));ctx.stroke();if(this.s==='guard'){ctx.fillStyle='#333';ctx.fillRect(24,-118,22,72);ctx.strokeRect(24,-118,22,72);}ctx.restore();ctx.fillStyle='#fff';ctx.font='18px system-ui';ctx.textAlign='center';ctx.fillText(this.msg||this.s,this.x,this.y-190);}}
const p=new F(250,'#1368d8','PLAYER'),e=new F(710,'#d22c2c','CPU');
function hit(a,b){if(!a.active()||a.done||!a.m)return;a.done=1;if(Math.abs(a.x-b.x)<a.m[2]){let dmg=a.m[1],bal=a.m[1]/4;if(b.s==='guard'){dmg=Math.floor(dmg*.2);bal*=.45;b.msg='ガード';}else{b.flash=8;b.x+=a.f*20;b.msg='ヒット';}b.hp=Math.max(0,b.hp-dmg);b.bal=Math.max(0,b.bal-bal);}}
function stage(){let g=ctx.createLinearGradient(0,0,0,360);g.addColorStop(0,'#60c8ff');g.addColorStop(1,'#eaf9ff');ctx.fillStyle=g;ctx.fillRect(0,0,960,540);ctx.fillStyle='#6aaa65';ctx.beginPath();ctx.arc(180,350,230,Math.PI,0);ctx.fill();ctx.beginPath();ctx.arc(720,352,260,Math.PI,0);ctx.fill();ctx.fillStyle='#9b7658';ctx.fillRect(0,290,960,15);ctx.fillRect(0,324,960,14);for(let x=0;x<960;x+=90)ctx.fillRect(x,285,9,72);ctx.fillStyle='#245ba8';ctx.fillRect(0,340,960,200);ctx.fillStyle='#b82b2b';ctx.fillRect(0,340,960,18);ctx.fillStyle='#ffffff18';for(let x=0;x<960;x+=40)ctx.fillRect(x,340,1,200);}
function bar(x,y,w,h,v,max,col,label){ctx.fillStyle='#222';ctx.fillRect(x,y,w,h);ctx.fillStyle=col;ctx.fillRect(x,y,w*(v/max),h);ctx.strokeStyle='#111';ctx.strokeRect(x,y,w,h);ctx.fillStyle='#fff';ctx.font='16px system-ui';ctx.textAlign='center';ctx.fillText(label,x+w/2,y+h-6)}
function hud(){ctx.fillStyle='#111c';ctx.fillRect(0,0,960,82);ctx.fillStyle='#fff';ctx.font='22px system-ui';ctx.textAlign='left';ctx.fillText('PLAYER',28,26);ctx.textAlign='right';ctx.fillText('CPU',932,26);bar(28,36,360,24,p.hp,1000,'#36d12f',p.hp+'/1000');bar(572,36,360,24,e.hp,1000,'#36d12f',e.hp+'/1000');bar(140,66,250,10,p.bal,100,'#1e82ff','');bar(570,66,250,10,e.bal,100,'#1e82ff','');ctx.fillStyle='#fff';ctx.font='18px system-ui';ctx.textAlign='center';ctx.fillText('↓回転中 + 小 = ティッチャギ（後ろ蹴り） / ↓回転中 + 大 = ティフリギ（後ろ回し蹴り）',480,524);}
function loop(){frame++;p.input(e,1);e.input(p,0);hit(p,e);hit(e,p);stage();hud();p.draw();e.draw();if(p.hp<=0||e.hp<=0){ctx.fillStyle='#000b';ctx.fillRect(0,0,960,540);ctx.fillStyle='#fff';ctx.font='62px system-ui';ctx.textAlign='center';ctx.fillText(p.hp<=0?'CPU WIN':'PLAYER WIN',480,260);ctx.font='24px system-ui';ctx.fillText('ページ更新で再戦',480,305);}Object.keys(press).forEach(k=>delete press[k]);requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
