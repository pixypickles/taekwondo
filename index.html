<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Taekwondo Mobile Prototype</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="touch-ui">
      <div class="dpad">
        <button data-input="up" class="up">▲</button>
        <button data-input="left" class="left">◀</button>
        <button data-input="down" class="down">▼</button>
        <button data-input="right" class="right">▶</button>
      </div>
      <div class="buttons">
        <button data-input="small" class="small">小</button>
        <button data-input="big" class="big">大</button>
        <button data-input="guard" class="guard">ガード</button>
      </div>
    </div>
  </div>
  <script src="js/moveData.js"></script>
  <script src="js/input.js"></script>
  <script src="js/player.js"></script>
  <script src="js/cpu.js"></script>
  <script src="js/collision.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
