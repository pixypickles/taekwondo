<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Taekwondo Single v002</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#162333;touch-action:none;font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}
canvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:10px;left:10px;color:#fff;text-shadow:0 2px 4px #000;z-index:3}
#move{font-size:20px;font-weight:800}
#debug{font-size:12px;opacity:.75}
#controls{position:fixed;left:0;right:0;bottom:max(12px,env(safe-area-inset-bottom));height:172px;z-index:5;pointer-events:none}
button{position:absolute;width:66px;height:66px;border-radius:50%;border:3px solid rgba(255,255,255,.48);background:rgba(255,255,255,.2);color:#fff;font-size:28px;font-weight:900;pointer-events:auto;user-select:none;-webkit-tap-highlight-color:transparent}
button.down,button:active{transform:scale(.94);background:rgba(255,255,255,.36)}
.up{left:96px;bottom:96px}.left{left:24px;bottom:28px}.rot{left:96px;bottom:28px;background:rgba(190,170,70,.45)}.right{left:168px;bottom:28px}
.small{right:184px;bottom:28px;background:rgba(30,135,255,.48)}.big{right:106px;bottom:28px;background:rgba(255,70,80,.5)}.guard{right:28px;bottom:28px;background:rgba(30,35,45,.72)}
@media(max-height:640px){#controls{height:148px}button{width:58px;height:58px;font-size:24px}.up{left:92px;bottom:82px}.left{left:26px;bottom:22px}.rot{left:92px;bottom:22px}.right{left:158px;bottom:22px}.small{right:164px;bottom:22px}.big{right:94px;bottom:22px}.guard{right:24px;bottom:22px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><div id="move">構え</div><div id="debug">single v002 / index.htmlだけで動作</div></div>
<div id="controls">
<button class="up" data-b="up">↑</button>
<button class="left" data-b="left">←</button>
<button class="rot" data-b="rotate">回</button>
<button class="right" data-b="right">→</button>
<button class="small" data-b="small">小</button>
<button class="big" data-b="big">大</button>
<button class="guard" data-b="guard">G</button>
</div>
<script>
(()=> {
const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");
let W=innerWidth,H=innerHeight,DPR=devicePixelRatio||1;
function resize(){W=innerWidth;H=innerHeight;DPR=devicePixelRatio||1;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}
addEventListener("resize",resize); resize();

const down=new Set(), events=[], lastTap={};
function press(b){
  const now=performance.now(); down.add(b); events.push({type:"press",name:b,time:now});
  if(b==="left"||b==="right"){ if(now-(lastTap[b]||0)<260)events.push({type:"double",name:b,time:now}); lastTap[b]=now; }
}
function release(b){down.delete(b); events.push({type:"release",name:b,time:performance.now()});}
document.querySelectorAll("[data-b]").forEach(el=>{
  const b=el.dataset.b;
  el.addEventListener("pointerdown",e=>{e.preventDefault();el.classList.add("down");press(b)}, {passive:false});
  const up=e=>{e.preventDefault();el.classList.remove("down");release(b)};
  el.addEventListener("pointerup",up,{passive:false}); el.addEventListener("pointercancel",up,{passive:false}); el.addEventListener("pointerleave",up,{passive:false});
});
const key={ArrowUp:"up",ArrowLeft:"left",ArrowRight:"right",ArrowDown:"rotate",z:"small",x:"big",c:"guard",Z:"small",X:"big",C:"guard"};
addEventListener("keydown",e=>{const b=key[e.key]; if(!b||down.has(b))return; e.preventDefault(); press(b)});
addEventListener("keyup",e=>{const b=key[e.key]; if(!b)return; e.preventDefault(); release(b)});

const moves={
 idle:{name:"構え",dur:1,frames:[{t:0,pose:"idle"}]},
 ap:{name:"アプチャギ",dur:360,frames:[{t:0,pose:"load"},{t:.28,pose:"knee"},{t:.52,pose:"front",trail:"short"},{t:1,pose:"idle"}]},
 dol:{name:"トルリョチャギ",dur:430,frames:[{t:0,pose:"load"},{t:.3,pose:"knee"},{t:.58,pose:"round",trail:"round"},{t:1,pose:"idle"}]},
 rot:{name:"回転フェイント",dur:520,rot:true,frames:[{t:0,pose:"closed",y:-8},{t:.42,pose:"back"},{t:.68,pose:"closed",y:-8},{t:1,pose:"idle"}]},
 dwit:{name:"ティッチャギ",dur:430,frames:[{t:0,pose:"closed",y:-8},{t:.25,pose:"back",y:-3},{t:.45,pose:"backLoad",y:-6},{t:.68,pose:"backKick",y:-8,trail:"straight"},{t:1,pose:"idle"}]},
 huri:{name:"ティフリギ",dur:520,frames:[{t:0,pose:"closed",y:-8},{t:.25,pose:"back",y:-3},{t:.48,pose:"backKick",y:-8,trail:"straight"},{t:.72,pose:"hook",y:-4,trail:"ellipse"},{t:1,pose:"idle"}]},
 na:{name:"ネリョチャギ",dur:480,frames:[{t:0,pose:"load"},{t:.30,pose:"axeUp",trail:"axe"},{t:.62,pose:"axeDown",trail:"axe"},{t:1,pose:"idle"}]},
 jumpHuri:{name:"跳びティフリギ",dur:610,frames:[{t:0,pose:"jumpLoad"},{t:.28,pose:"jumpBack",y:-26,trail:"straight"},{t:.55,pose:"jumpHook",y:-20,trail:"ellipse"},{t:.78,pose:"land"},{t:1,pose:"idle"}]},
 retDol:{name:"下がりトルリョチャギ",dur:480,frames:[{t:0,pose:"retreat",x:-20},{t:.45,pose:"round",x:-45,trail:"round"},{t:1,pose:"idle",x:-55}]},
 retDwit:{name:"下がり跳びティッチャギ",dur:560,frames:[{t:0,pose:"jumpLoad",x:-10},{t:.42,pose:"jumpBack",x:-55,y:-24,trail:"straight"},{t:1,pose:"idle",x:-65}]}
};
const player={x:0,y:0,f:1,color:"#1594ff",move:moves.idle,id:"idle",time:0,armed:false};
function start(id){player.id=id;player.move=moves[id];player.time=0;player.armed=id==="rot";document.getElementById("move").textContent=player.move.name}
function frame(){
 let p=Math.min(1,player.time/player.move.dur), f=player.move.frames[0];
 for(const k of player.move.frames) if(p>=k.t) f=k; return f;
}
function update(dt){
 const es=events.splice(0);
 for(const ev of es){
   if(ev.type==="double"&&ev.name==="right")player.x+=45;
   if(ev.type==="double"&&ev.name==="left")player.x-=45;
   if(ev.type==="press"){
    const up=down.has("up"), back=down.has("left");
    if(player.armed&&ev.name==="small")start("dwit");
    else if(player.armed&&ev.name==="big")start("huri");
    else if(ev.name==="rotate")start("rot");
    else if(ev.name==="small"&&up)start("na");
    else if(ev.name==="big"&&up)start("jumpHuri");
    else if(ev.name==="small"&&back)start("retDol");
    else if(ev.name==="big"&&back)start("retDwit");
    else if(ev.name==="small")start("ap");
    else if(ev.name==="big")start("dol");
   }
 }
 if(player.id==="idle"){
  if(down.has("left"))player.x-=160*dt;
  if(down.has("right"))player.x+=160*dt;
 }else{
  player.time+=dt*1000;
  if(player.time>player.move.dur)start("idle");
 }
}

function line(x1,y1,x2,y2,w,c,a=1){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=c;ctx.lineWidth=w;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function arc(x,y,r,s,e,a=.38){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle="white";ctx.lineWidth=11;ctx.lineCap="round";ctx.beginPath();ctx.arc(x,y,r,s,e);ctx.stroke();ctx.restore()}
function ell(x,y,rx,ry,s,e,a=.45){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle="white";ctx.lineWidth=12;ctx.lineCap="round";ctx.beginPath();ctx.ellipse(x,y,rx,ry,-.22,s,e);ctx.stroke();ctx.restore()}
function trails(x,y,f,t){
 if(t==="short")line(x+f*34,y,x+f*96,y-4,8,"white",.38);
 if(t==="round")arc(x+f*28,y-10,78,f>0?-.7:Math.PI+.7,f>0?.22:Math.PI-.22,.35);
 if(t==="straight")line(x+f*20,y-35,x+f*170,y-65,12,"white",.40);
 if(t==="ellipse")ell(x+f*145,y-72,95,44,f>0?Math.PI*1.08:-.08,f>0?Math.PI*1.88:Math.PI*.92,.48);
 if(t==="axe")arc(x+f*50,y-40,98,f>0?-1.55:Math.PI+1.55,f>0?.65:Math.PI-.65,.35);
}
function fighter(x,y,f,color,pose){
 const ground=y+118; let head={x,y:y-100}, top={x,y:y-62}, hip={x,y:y+5}, fh={x:x+f*48,y:y-42}, rh={x:x-f*38,y:y-22}, fa={x:x-f*36,y:ground}, fb={x:x+f*58,y:ground}, ka={x:x-f*18,y:y+56}, kb={x:x+f*35,y:y+56};
 if(pose==="load"){hip.x-=f*8;kb.x-=f*16;fb.x-=f*20}
 if(pose==="knee"){kb={x:x+f*50,y:y};fb={x:x+f*70,y:y+10}}
 if(pose==="front"){kb={x:x+f*58,y:y-5};fb={x:x+f*125,y:y-10}}
 if(pose==="round"){hip.x-=f*6;kb={x:x+f*60,y:y-10};fb={x:x+f*135,y:y-35}}
 if(pose==="axeUp"){kb={x:x+f*52,y:y-55};fb={x:x+f*75,y:y-132}}
 if(pose==="axeDown"){kb={x:x+f*78,y:y-35};fb={x:x+f*116,y:y+24}}
 if(pose==="closed"){fa={x:x-f*10,y:ground-18};fb={x:x+f*12,y:ground-18};ka={x:x-f*8,y:y+58};kb={x:x+f*10,y:y+58};fh={x:x+f*25,y:y-40};rh={x:x-f*25,y:y-30}}
 if(pose==="back"){head.x=x-f*8;fh={x:x-f*28,y:y-35};rh={x:x+f*20,y:y-30};fa={x:x+f*25,y:ground};fb={x:x-f*42,y:ground};ka={x:x+f*18,y:y+55};kb={x:x-f*26,y:y+55}}
 if(pose==="backLoad"){head.x=x-f*22;hip.x=x-f*6;kb={x:x+f*18,y:y};fb={x:x+f*40,y:y+20};fa={x:x-f*8,y:ground}}
 if(pose==="backKick"||pose==="jumpBack"){head.x=x-f*24;top.x=x-f*10;hip.x=x-f*8;kb={x:x+f*70,y:y-34};fb={x:x+f*160,y:y-62};fa={x:x-f*6,y:ground};ka={x:x-f*4,y:y+58}}
 if(pose==="hook"||pose==="jumpHook"){head.x=x-f*22;top.x=x-f*10;hip.x=x-f*6;kb={x:x+f*96,y:y-72};fb={x:x+f*130,y:y-110};fa={x:x-f*8,y:ground};ka={x:x-f*5,y:y+58}}
 if(pose==="jumpLoad"){hip.y+=6;kb={x:x+f*30,y:y+25};fb={x:x+f*46,y:y+48}}
 if(pose==="retreat"){hip.x-=f*18;fa.x-=f*22;fb.x-=f*28}
 if(pose==="land")hip.y+=8;
 line(top.x,top.y,hip.x,hip.y,22,color); line(top.x,top.y,fh.x,fh.y,14,color); line(top.x,top.y+8,rh.x,rh.y,14,color);
 line(hip.x,hip.y,ka.x,ka.y,18,color); line(ka.x,ka.y,fa.x,fa.y,18,color); line(hip.x,hip.y,kb.x,kb.y,18,color); line(kb.x,kb.y,fb.x,fb.y,18,color);
 line(fa.x-f*12,fa.y+2,fa.x+f*18,fa.y+2,12,"#07101f"); line(fb.x-f*12,fb.y+2,fb.x+f*18,fb.y+2,12,"#07101f");
 ctx.fillStyle="#ffd2b0"; ctx.beginPath();ctx.arc(fh.x,fh.y,12,0,Math.PI*2);ctx.fill(); ctx.beginPath();ctx.arc(rh.x,rh.y,12,0,Math.PI*2);ctx.fill();
 ctx.fillStyle="#ffc59f"; ctx.beginPath();ctx.arc(head.x,head.y,28,0,Math.PI*2);ctx.fill(); ctx.fillStyle="#111";ctx.beginPath();ctx.arc(head.x+f*10,head.y-5,5,0,Math.PI*2);ctx.fill();
}
function render(){
 ctx.fillStyle="#182536"; ctx.fillRect(0,0,W,H); ctx.fillStyle="#2c3b49"; ctx.fillRect(0,H*.47,W,H*.53); line(0,H*.79,W,H*.79,3,"rgba(255,255,255,.35)");
 player.y=H*.50; const fr=frame(); const x=player.x||W*.30; const px=x+(fr.x||0), py=player.y+(fr.y||0);
 fighter(W*.70,H*.50,-1,"#ff3a48","idle"); trails(px,py,1,fr.trail); fighter(px,py,1,player.color,fr.pose||"idle");
}
let last=performance.now(); player.x=W*.30;
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);render();requestAnimationFrame(loop)}
requestAnimationFrame(loop);
})();
</script>
</body></html>
