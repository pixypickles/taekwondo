<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Taekwondo v3.003</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#172434;touch-action:none;font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}
canvas{display:block;width:100vw;height:100vh}
#bars{position:fixed;top:8px;left:10px;right:10px;height:56px;color:white;font-weight:900;text-shadow:0 2px 4px #000;z-index:5;pointer-events:none}
.label{position:absolute;top:0;font-size:12px}.pl{left:3px}.el{right:3px}
.wrap{position:absolute;top:18px;width:38%;height:18px;border:2px solid #ffffffaa;background:#0006;border-radius:12px;overflow:hidden}
.bwrap{position:absolute;top:42px;width:38%;height:8px;border:1px solid #ffffff77;background:#0006;border-radius:8px;overflow:hidden}
.leftbar{left:0}.rightbar{right:0}.hp{height:100%;background:#23d45a;width:100%}.bal{height:100%;background:#8be4ff;width:100%}
#hud{position:fixed;top:68px;left:10px;color:white;text-shadow:0 2px 4px #000;z-index:6;pointer-events:none}
#move{font-size:20px;font-weight:900}#state{font-size:16px;font-weight:900;margin-top:3px}#debug{font-size:12px;opacity:.8;margin-top:3px}
#controls{position:fixed;left:0;right:0;bottom:max(12px,env(safe-area-inset-bottom));height:172px;z-index:10;pointer-events:none}
button{position:absolute;width:66px;height:66px;border-radius:50%;border:3px solid #ffffff78;background:#ffffff33;color:white;font-size:28px;font-weight:900;pointer-events:auto;user-select:none;-webkit-tap-highlight-color:transparent}
button.down,button:active{transform:scale(.94);background:#ffffff5c}.up{left:96px;bottom:96px}.lbtn{left:24px;bottom:28px}.rot{left:96px;bottom:28px;background:#bea84673}.rbtn{left:168px;bottom:28px}.small{right:150px;bottom:28px;background:#1e87ff7a}.big{right:72px;bottom:28px;background:#ff465080}.guard{right:111px;bottom:86px;background:#1e232db8}
@media(max-height:640px){#controls{height:148px}button{width:58px;height:58px;font-size:24px}.up{left:92px;bottom:82px}.lbtn{left:26px;bottom:22px}.rot{left:92px;bottom:22px}.rbtn{left:158px;bottom:22px}.small{right:142px;bottom:22px}.big{right:74px;bottom:22px}.guard{right:108px;bottom:76px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="bars">
  <div class="label pl">PLAYER</div><div class="label el">CPU</div>
  <div class="wrap leftbar"><div id="pHp" class="hp"></div></div><div class="wrap rightbar"><div id="cHp" class="hp"></div></div>
  <div class="bwrap leftbar"><div id="pBal" class="bal"></div></div><div class="bwrap rightbar"><div id="cBal" class="bal"></div></div>
</div>
<div id="hud"><div id="move">構え</div><div id="state"></div><div id="debug">v3.003 / 下がり跳び・押し蹴り・ボタン修正</div></div>
<div id="controls">
<button class="up" data-b="up">↑</button><button class="lbtn" data-b="left">←</button><button class="rot" data-b="rotate">回</button><button class="rbtn" data-b="right">→</button>
<button class="small" data-b="small">小</button><button class="big" data-b="big">大</button><button class="guard" data-b="guard">G</button>
</div>
<script>
(()=> {
const cvs=document.getElementById("game"),ctx=cvs.getContext("2d");
let W=0,H=0,D=1;function resize(){W=innerWidth;H=innerHeight;D=devicePixelRatio||1;cvs.width=W*D;cvs.height=H*D;ctx.setTransform(D,0,0,D,0,0)}addEventListener("resize",resize);resize();

const Moves={
 idle:{n:"構え",d:.1},
 ap:{n:"アプチャギ",d:.34,damage:5,bal:8,kb:18,range:105,h:-10,win:[.45,.62]},
 dol:{n:"トルリョチャギ",d:.42,damage:8,bal:10,kb:30,range:125,h:-35,win:[.50,.68]},
 putcho:{n:"プッチョ",d:.25,damage:4,bal:6,kb:14,range:112,h:-35,win:[.34,.54]},
 milgi:{n:"押し蹴り",d:.44,damage:3,bal:16,kb:92,range:148,h:-18,win:[.50,.78],push:true},
 rot:{n:"回転フェイント",d:.47},
 dwit:{n:"ティッチャギ",d:.41,damage:12,bal:18,kb:46,range:160,h:-62,win:[.56,.76],heavy:true},
 huri:{n:"ティフリギ",d:.47,damage:14,bal:22,kb:54,range:145,h:-95,win:[.54,.78],heavy:true},
 turn:{n:"ターンチャギ",d:.70,damage:20,bal:30,kb:70,range:140,h:-48,win:[.58,.82],heavy:true},
 na:{n:"ネリョチャギ",d:.50,damage:10,bal:12,kb:24,range:112,h:-35,win:[.52,.74]},
 jumpHuri:{n:"跳びティフリギ",d:.58,damage:17,bal:26,kb:70,range:150,h:-88,win:[.42,.68],heavy:true},
 retDol:{n:"下がりトルリョチャギ",d:.47,damage:7,bal:9,kb:28,range:125,h:-35,win:[.38,.58]},
 retDwit:{n:"下がり跳びティッチャギ",d:.54,damage:12,bal:18,kb:48,range:160,h:-62,win:[.36,.60],heavy:true}
};

const input={down:new Set(),events:[],tap:{}};function isDown(b){return input.down.has(b)}
function press(b){const now=performance.now(); if(input.down.has(b))return; input.down.add(b); input.events.push({t:"press",b,now}); if(b==="left"||b==="right"){if(now-(input.tap[b]||0)<260)input.events.push({t:"double",b,now}); input.tap[b]=now}}
function release(b){input.down.delete(b)}
document.querySelectorAll("[data-b]").forEach(el=>{const b=el.dataset.b;el.addEventListener("pointerdown",e=>{e.preventDefault();el.classList.add("down");press(b)},{passive:false});const up=e=>{e.preventDefault();el.classList.remove("down");release(b)};el.addEventListener("pointerup",up,{passive:false});el.addEventListener("pointercancel",up,{passive:false});el.addEventListener("pointerleave",up,{passive:false})});
const key={ArrowUp:"up",ArrowLeft:"left",ArrowRight:"right",ArrowDown:"rotate",z:"small",x:"big",c:"guard",Z:"small",X:"big",C:"guard"};
addEventListener("keydown",e=>{if(e.key==="r"||e.key==="R"){input.events.push({t:"reset"});return}const b=key[e.key];if(b){e.preventDefault();press(b)}});addEventListener("keyup",e=>{const b=key[e.key];if(b){e.preventDefault();release(b)}});

class Fighter{
 constructor(x,f,c,isPlayer){this.baseX=x;this.f=f;this.c=c;this.isPlayer=isPlayer;this.reset(false)}
 reset(keepScore=true){this.x=this.baseX;this.y=H*.5;this.hp=100;this.bal=100;this.id="idle";this.time=0;this.guard=false;this.stun=0;this.ko=false;this.flash=0;this.lastHit="";this.cd=.5;this.counter=.0;this.spinReady=0;this.spinBonus=0;this.spinText=0;this.rotBuf=0;this.turnReady=0;this.turnDir=.45;this.pushReady=0;this.step=0;this.stepDir=0}
 move(){return Moves[this.id]} progress(){return Math.min(1,this.time/(this.move().d||.1))}
 start(id){this.id=id;this.time=0;this.lastHit="";if(this.isPlayer)document.getElementById("move").textContent=this.move().n}
}
let P=new Fighter(W*.3,1,"#1594ff",true), C=new Fighter(W*.7,-1,"#ff3a48",false);
let hitStop=0,koText=0,restart=0,pWins=0,cWins=0;

function fullReset(){P=new Fighter(W*.3,1,"#1594ff",true);C=new Fighter(W*.7,-1,"#ff3a48",false);hitStop=koText=restart=0;pWins=cWins=0;document.getElementById("move").textContent="構え"}
function nextRound(){P.reset();C.reset();hitStop=koText=restart=0;document.getElementById("move").textContent="構え"}

function handleInput(dt){
 P.guard=isDown("guard")&&P.id==="idle"&&P.stun<=0;
 for(const k of ["spinReady","spinText","rotBuf","turnReady","pushReady","step","counter"])P[k]=Math.max(0,P[k]-dt);
 const evs=input.events.splice(0);
 for(const ev of evs){
  if(ev.t==="reset"){fullReset();continue}
  if(ev.t==="double"&&ev.b==="right"){P.step=.32;P.stepDir=1;P.x+=40;continue}
  if(ev.t==="double"&&ev.b==="left"){P.step=.32;P.stepDir=-1;P.x-=40;continue}
  if(ev.t!=="press"||P.stun>0||P.ko)continue;
  const fw=isDown("right"),bk=isDown("left"),up=isDown("up");
  if((ev.b==="guard"&&fw)||(ev.b==="right"&&isDown("guard")))P.pushReady=.95;
  if(ev.b==="guard" && isDown("big") && P.id==="idle"){P.pushReady=0;P.start("milgi");continue}

  if(ev.b==="big"&&P.turnReady>0){P.turnDir=bk?0:(fw?1:.45);P.spinBonus=P.spinReady>0?1:0;if(P.spinBonus)P.spinText=.55;P.start("turn");continue}
  if((P.id==="rot"||P.spinReady>0)&&ev.b==="small"){P.spinBonus=P.spinReady>0?1:0;if(P.spinBonus)P.spinText=.55;P.start("dwit");continue}
  if((P.id==="rot"||P.spinReady>0)&&ev.b==="big"){P.spinBonus=P.spinReady>0?1:0;if(P.spinBonus)P.spinText=.55;P.start("huri");continue}
  if(ev.b==="rotate"){if(P.rotBuf>0||P.id==="rot"){P.turnReady=.95;P.spinReady=.25;P.spinText=.45}P.rotBuf=.58;P.start("rot");continue}
  if(ev.b==="big" && isDown("guard")){P.pushReady=0;P.start("milgi");continue}
  if((ev.b==="small"||ev.b==="big")&&(P.pushReady>0||(isDown("guard")&&(fw||(P.step>0&&P.stepDir===1))))){P.pushReady=0;P.start("milgi");continue}
  if(ev.b==="small"&&up){P.start("na");continue}
  if(ev.b==="big"&&up){P.start("jumpHuri");continue}
  if(ev.b==="small"&&(fw||(P.step>0&&P.stepDir===1))){P.start("putcho");continue}
  if(ev.b==="small"&&bk){P.start("retDol");continue}
  if(ev.b==="big"&&bk){P.start("retDwit");continue}
  if(ev.b==="small"){P.start("ap");continue}
  if(ev.b==="big"){P.start("dol");continue}
 }
}
function updatePlayer(dt){
 if(P.stun>0){P.stun=Math.max(0,P.stun-dt);return}
 if(P.id==="idle"){if(isDown("left"))P.x-=160*dt;if(isDown("right"))P.x+=160*dt}
 else{if(["rot","dwit","huri"].includes(P.id)){if(isDown("right"))P.x+=90*dt;if(isDown("left"))P.x-=90*dt}if(P.id==="turn")P.x+=135*dt*P.turnDir;
  if(P.id==="milgi")P.x+=105*dt;P.time+=dt;if(P.id==="rot"){const p=P.progress();if(p>.76&&p<.96)P.spinReady=isDown("right")?.22:.16}tryHit(P,C);if(P.time>P.move().d)P.start("idle")}
 P.x=Math.max(60,Math.min(W-60,P.x));
}
function cpu(dt){
 if(C.ko)return;
 if(C.stun>0){C.stun=Math.max(0,C.stun-dt);C.guard=false;return}
 if(C.id!=="idle"){if(C.id==="milgi")C.x-=105*dt;C.time+=dt;tryHit(C,P);if(C.time>C.move().d){C.start("idle");C.cd=.35+Math.random()*.45}return}
 C.cd=Math.max(0,C.cd-dt);const dist=C.x-P.x;C.guard=false;if(P.id!=="idle"&&P.progress()<.58&&Math.random()<.028)C.guard=true;
 if(dist>270)C.x-=105*dt;else if(dist<145)C.x+=115*dt;else if(C.cd<=0){const r=Math.random();C.start(dist<175&&r<.30?"putcho":dist<230&&r<.62?"milgi":r<.80?"ap":r<.94?"dol":"na")}
 C.x=Math.max(W*.18,Math.min(W-70,C.x));
}
function guarding(u){return u.guard&&u.id==="idle"&&u.stun<=0}
function damage(a,t,m){
 let d=m.damage||0;const spin=a.isPlayer&&a.spinBonus>0;if(spin)d=Math.ceil(d*(m.heavy?1.25:1.15));
 if(guarding(t)){d=Math.ceil(d*.25);a.bal=Math.max(0,a.bal-(m.heavy?24:8));if(m.heavy){a.stun=spin?.62:.42;t.counter=.8}}
 else t.bal=Math.max(0,t.bal-(m.bal||8)-(spin?10:0));
 const kb=(m.kb||20)+(spin?18:0); if(t.f<0)t.x+=kb;else t.x-=kb;
 t.hp=Math.max(0,t.hp-d);t.flash=.18;hitStop=spin?.065:(m.heavy?.045:.025);
 if(t.bal<=0){t.stun=1;t.bal=45}
 if(t.hp<=0&&!t.ko){t.ko=true;koText=1.5;restart=2.2;t.isPlayer?cWins++:pWins++}
}
function tryHit(a,t){
 const m=a.move();if(!m.damage)return;const p=a.progress();if(!m.win||p<m.win[0]||p>m.win[1])return;if(a.lastHit===a.id)return;
 const hx=a.x+a.f*m.range,hy=a.y+m.h,tx=t.x-t.f*28,ty=t.y-70;
 if(Math.abs(hx-tx)<68&&Math.abs(hy-ty)<78){damage(a,t,m);a.lastHit=a.id;if(a.isPlayer)a.spinBonus=0}
}
function line(x1,y1,x2,y2,w,c,a=1){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=c;ctx.lineWidth=w;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()}
function ell(x,y,rx,ry,rot,s,e,w=12,a=.4){ctx.save();ctx.globalAlpha=a;ctx.strokeStyle="white";ctx.lineWidth=w;ctx.lineCap="round";ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot,s,e);ctx.stroke();ctx.restore()}
function trail(u,x,y){const f=u.f,id=u.id;if(["rot","dwit","huri","turn","jumpHuri"].includes(id)){ell(x,y-38,58,18,-.25,Math.PI*1.05,Math.PI*1.86,10,.32);ell(x,y+10,54,16,-.22,Math.PI*.1,Math.PI*.86,10,.26)}if(id==="huri"||id==="jumpHuri")ell(x+f*145,y-72,95,44,-.22,f>0?Math.PI*1.08:-.08,f>0?Math.PI*1.88:Math.PI*.92,12,.48);if(id==="turn")ell(x+f*118,y-48,88,38,-.18,f>0?Math.PI*1.05:.02,f>0?Math.PI*1.78:Math.PI*.95,12,.44);if(id==="dwit"||id==="retDwit")line(x+f*20,y-35,x+f*170,y-65,12,"white",.4);if(id==="milgi"){line(x+f*126,y-50,x+f*126,y+10,10,"white",.32);line(x+f*98,y-34,x+f*126,y-34,6,"white",.22)}if(id==="putcho")ell(x+f*44,y-12,46,30,0,f>0?-.55:Math.PI+.55,f>0?.15:Math.PI-.15,9,.35);if(id==="na")ell(x+f*42,y-28,82,105,0,f>0?-1.25:Math.PI+1.25,f>0?.80:Math.PI-.80,11,.35)}
function fighter(u){
 let p=u.progress(),x=u.x,y=u.y,f=u.f,id=u.id,c=u.flash>0?"#fff":(u.guard?"#9fd8ff":u.c);
 if(id==="rot")y-=12*Math.abs(Math.sin(Math.PI*p*2));
 if(id==="jumpHuri")y-=34*Math.sin(Math.PI*p);
 if(id==="retDwit")y-=26*Math.sin(Math.PI*p);
 const g=y+118;let head={x,y:y-100},top={x,y:y-62},hip={x,y:y+5},fh={x:x+f*48,y:y-42},rh={x:x-f*38,y:y-22},fa={x:x-f*36,y:g},fb={x:x+f*58,y:g},ka={x:x-f*18,y:y+56},kb={x:x+f*35,y:y+56};
 if(id==="milgi"){
   top.x-=f*8;hip.x-=f*12;fh={x:x+f*34,y:y-42};
   if(p<.45){
     // 膝を高く体に引き付ける準備
     kb={x:x+f*48,y:y-44};fb={x:x+f*58,y:y-12};
     ka={x:x-f*18,y:y+56};fa={x:x-f*36,y:g};
   }else{
     // 足裏で前に押す
     kb={x:x+f*78,y:y-18};fb={x:x+f*150,y:y-18};
   }
 }
 else if(id==="putcho"){kb={x:x+f*55,y:y-14};fb={x:x+f*118,y:y-38}}
 else if(id==="dwit"){head.x=x-f*24;top.x=x-f*10;hip.x=x-f*8;kb={x:x+f*70,y:y-34};fb={x:x+f*160,y:y-62};fa={x:x-f*6,y:g}}
 else if(id==="retDwit"){head.x=x-f*24;top.x=x-f*10;hip.x=x-f*8;kb={x:x+f*70,y:y-34};fb={x:x+f*160,y:y-62};fa={x:x-f*10,y:g-18};ka={x:x-f*8,y:y+48}}
 else if(id==="huri"){head.x=x-f*22;top.x=x-f*10;hip.x=x-f*6;kb={x:x+f*96,y:y-72};fb={x:x+f*130,y:y-110};fa={x:x-f*8,y:g}}
 else if(id==="jumpHuri"){head.x=x-f*24;top.x=x-f*12;hip.x=x-f*8;kb={x:x+f*100,y:y-78};fb={x:x+f*142,y:y-112};fa={x:x-f*10,y:g-18};ka={x:x-f*8,y:y+48}}
 else if(id==="turn"){head.x=x-f*18;top.x=x-f*10;hip.x=x-f*8;kb={x:x+f*82,y:y-35};fb={x:x+f*138,y:y-48};fa={x:x-f*8,y:g}}
 else if(id==="na"){const a=-1.25+p*2.05,cx=x+f*42,cy=y-28;kb={x:x+f*58,y:y-24};fb={x:cx+f*Math.cos(a)*82,y:cy+Math.sin(a)*105}}
 else if(id==="dol"||id==="retDol"){kb={x:x+f*60,y:y-10};fb={x:x+f*135,y:y-35}}
 else if(id==="ap"){kb={x:x+f*58,y:y-5};fb={x:x+f*125,y:y-10}}
 else if(id==="rot"){if(p<.25||p>=.50&&p<.75){fa={x:x-f*6,y:g-24};fb={x:x+f*8,y:g-24};ka={x:x-f*5,y:y+58};kb={x:x+f*6,y:y+58}}else if(p<.5){fa={x:x+f*24,y:g};fb={x:x-f*40,y:g};ka={x:x+f*18,y:y+56};kb={x:x-f*26,y:y+56};head.x=x-f*8;fh={x:x-f*28,y:y-35};rh={x:x+f*20,y:y-30}}}
 trail(u,x,y);
 if(u.spinBonus&&(id==="dwit"||id==="huri"||id==="turn")){ctx.save();ctx.globalAlpha=.42;ctx.strokeStyle="white";ctx.lineWidth=5;ctx.beginPath();ctx.arc(x+f*80,y-55,42,0,7);ctx.stroke();ctx.restore()}
 if(u.guard){ctx.save();ctx.strokeStyle="#9fd8ff";ctx.globalAlpha=.55;ctx.lineWidth=5;ctx.beginPath();ctx.arc(x+f*42,y-45,42,f>0?2.1:-1.1,f>0?4.2:1.1);ctx.stroke();ctx.restore()}
 line(top.x,top.y,hip.x,hip.y,22,c);line(top.x,top.y,fh.x,fh.y,14,c);line(top.x,top.y+8,rh.x,rh.y,14,c);line(hip.x,hip.y,ka.x,ka.y,18,c);line(ka.x,ka.y,fa.x,fa.y,18,c);line(hip.x,hip.y,kb.x,kb.y,18,c);line(kb.x,kb.y,fb.x,fb.y,18,c);
 line(fa.x-f*12,fa.y+2,fa.x+f*18,fa.y+2,12,"#07101f");if(id==="milgi"&&p>=.45)line(fb.x+f*4,fb.y-30,fb.x+f*4,fb.y+30,18,"#07101f");else line(fb.x-f*12,fb.y+2,fb.x+f*18,fb.y+2,12,"#07101f");
 ctx.fillStyle="#ffd2b0";ctx.beginPath();ctx.arc(fh.x,fh.y,12,0,7);ctx.fill();ctx.beginPath();ctx.arc(rh.x,rh.y,12,0,7);ctx.fill();ctx.fillStyle="#ffc59f";ctx.beginPath();ctx.arc(head.x,head.y,28,0,7);ctx.fill();ctx.fillStyle="#111";ctx.beginPath();ctx.arc(head.x+f*10,head.y-5,5,0,7);ctx.fill();if(u.flash>0){line(x+f*24,y-90,x+f*60,y-60,4,"white",.9);line(x+f*60,y-90,x+f*24,y-60,4,"white",.9)}
}
function draw(){ctx.fillStyle="#182536";ctx.fillRect(0,0,W,H);ctx.fillStyle="#2c3b49";ctx.fillRect(0,H*.47,W,H*.53);line(0,H*.79,W,H*.79,3,"#ffffff55");fighter(C);fighter(P);if(koText>0||P.ko||C.ko){ctx.save();ctx.textAlign="center";ctx.fillStyle="white";ctx.font="900 54px system-ui";ctx.fillText(P.ko?"YOU LOSE":"K.O.",W/2,H*.34);ctx.font="900 18px system-ui";ctx.fillText("NEXT ROUND...",W/2,H*.34+36);ctx.fillText("PLAYER "+pWins+" - "+cWins+" CPU",W/2,H*.34+62);ctx.restore()}}
function hud(){pHp.style.width=P.hp+"%";cHp.style.width=C.hp+"%";pBal.style.width=P.bal+"%";cBal.style.width=C.bal+"%";state.textContent=P.turnReady>0?"TURN READY":P.spinText>0?"SPIN BONUS!":P.spinReady>0&&P.id==="rot"?"SPIN READY":P.pushReady>0?"PUSH READY":""}
function roundUpdate(dt){if(P.ko||C.ko){koText=Math.max(0,koText-dt);restart=Math.max(0,restart-dt);if(restart<=0)nextRound();return true}return false}
let last=performance.now();function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;P.y=C.y=H*.5;if(hitStop>0){hitStop=Math.max(0,hitStop-dt);hud();draw();requestAnimationFrame(loop);return}if(!roundUpdate(dt)){handleInput(dt);updatePlayer(dt);cpu(dt);tryHit(C,P);P.flash=Math.max(0,P.flash-dt);C.flash=Math.max(0,C.flash-dt)}hud();draw();requestAnimationFrame(loop)}fullReset();requestAnimationFrame(loop);
})();
</script>
