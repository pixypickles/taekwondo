<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Taekwondo Duel</title>
<style>
html,body{margin:0;height:100%;background:#111;color:#fff;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;overflow:hidden;touch-action:none}#game{display:block;width:100vw;height:100vh;background:linear-gradient(#7fc9ff 0%,#bfe8ff 48%,#264b83 49%,#234a8b 100%)}.hud{position:fixed;top:8px;left:8px;right:8px;display:flex;gap:8px;align-items:flex-start;pointer-events:none}.panel{flex:1}.name{font-weight:800;font-size:13px}.bar{height:16px;background:#222;border:2px solid #000;border-radius:4px;overflow:hidden}.hp{height:100%;background:#36d832}.bal{height:8px;background:#1b63d9;margin-top:4px;border:1px solid #000;border-radius:3px;overflow:hidden}.bal>span{display:block;height:100%;background:#1ed0ff}.mid{font-size:18px;font-weight:900;text-align:center;background:#111;padding:8px 10px;border-radius:8px}.msg{position:fixed;top:64px;left:0;right:0;text-align:center;font-weight:900;font-size:20px;text-shadow:0 2px 2px #000;pointer-events:none}.controls{position:fixed;left:0;right:0;bottom:0;height:190px;pointer-events:none}.pad{position:absolute;left:18px;bottom:18px;width:154px;height:154px;border-radius:50%;background:rgba(255,255,255,.08);pointer-events:auto}.key{position:absolute;width:54px;height:54px;border-radius:14px;border:2px solid rgba(255,255,255,.35);background:rgba(30,30,30,.62);color:white;font-size:28px;font-weight:900}.up{left:50px;top:0}.down{left:50px;bottom:0;background:#caa10d}.left{left:0;top:50px}.right{right:0;top:50px}.buttons{position:absolute;right:14px;bottom:18px;width:208px;height:160px;pointer-events:auto}.btn{position:absolute;border-radius:50%;border:2px solid rgba(0,0,0,.55);color:#fff;font-weight:900;box-shadow:0 4px 0 rgba(0,0,0,.35)}.small{right:112px;bottom:76px;width:72px;height:72px;background:#176bd3;font-size:34px}.big{right:28px;bottom:76px;width:72px;height:72px;background:#d22a2a;font-size:34px}.guard{right:70px;bottom:0;width:80px;height:80px;background:#333;font-size:20px}.help{position:fixed;left:12px;top:92px;background:rgba(0,0,0,.45);padding:10px;border-radius:8px;font-size:12px;line-height:1.45;max-width:250px}.desktop{opacity:.85}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud"><div class="panel"><div class="name">PLAYER</div><div class="bar"><div id="php" class="hp" style="width:100%"></div></div><div class="bal"><span id="pbal" style="width:100%"></span></div></div><div class="mid" id="timer">60</div><div class="panel"><div class="name" style="text-align:right">CPU</div><div class="bar"><div id="ehp" class="hp" style="width:100%"></div></div><div class="bal"><span id="ebal" style="width:100%"></span></div></div></div>
<div class="msg" id="msg">下で回転 → 小:ティッチャギ / 大:ティフリギ</div>
<div class="help desktop">PC: ←→移動 / 素早く2回でステップ<br>↓:回転フェイント / Z:小 / X:大 / C:ガード<br>↑+Z:ネリョチャギ / ↑+X:跳び後ろ回し蹴り<br>後+Z:下がりトルリョチャギ / 後+X:下がり跳びティッチャギ</div>
<div class="controls"><div class="pad"><button class="key up" data-k="up">▲</button><button class="key down" data-k="down">▼</button><button class="key left" data-k="left">◀</button><button class="key right" data-k="right">▶</button></div><div class="buttons"><button class="btn small" data-k="small">小</button><button class="btn big" data-k="big">大</button><button class="btn guard" data-k="guard">ガード</button></div></div>
<script>
const cvs=document.getElementById('game'),ctx=cvs.getContext('2d');let W=0,H=0,DPR=1;function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cvs.width=W*DPR;cvs.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}addEventListener('resize',resize);resize();
const keys={left:false,right:false,up:false,down:false,small:false,big:false,guard:false};let tap={left:0,right:0};function press(k,v){keys[k]=v;if(v&&(k==='left'||k==='right')){let now=performance.now();if(now-tap[k]<280)player.step(k==='right'?1:-1);tap[k]=now}if(v&&k==='small')player.kick('small');if(v&&k==='big')player.kick('big');if(v&&k==='down')player.rotate()}
addEventListener('keydown',e=>{const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',z:'small',Z:'small',x:'big',X:'big',c:'guard',C:'guard'};if(m[e.key]){e.preventDefault();press(m[e.key],true)}});addEventListener('keyup',e=>{const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',z:'small',Z:'small',x:'big',X:'big',c:'guard',C:'guard'};if(m[e.key])press(m[e.key],false)});document.querySelectorAll('[data-k]').forEach(b=>{let k=b.dataset.k;b.addEventListener('pointerdown',e=>{e.preventDefault();b.setPointerCapture(e.pointerId);press(k,true)});b.addEventListener('pointerup',e=>{e.preventDefault();press(k,false)});b.addEventListener('pointercancel',()=>press(k,false))});
const moves={small:{name:'小キック',dur:.32,hit:.13,range:70,dmg:38,bal:10,type:'mid'},big:{name:'大キック',dur:.48,hit:.22,range:92,dmg:62,bal:18,type:'mid'},naeryo:{name:'ネリョチャギ',dur:.55,hit:.28,range:72,dmg:66,bal:22,type:'high'},jumpSpin:{name:'跳び後ろ回し蹴り',dur:.78,hit:.44,range:104,dmg:92,bal:35,type:'high'},backRound:{name:'下がりトルリョチャギ',dur:.46,hit:.24,range:84,dmg:48,bal:18,type:'mid'},backDwit:{name:'下がり跳びティッチャギ',dur:.70,hit:.38,range:112,dmg:82,bal:32,type:'mid'},dwit:{name:'ティッチャギ（後ろ蹴り）',dur:.54,hit:.30,range:116,dmg:88,bal:34,type:'body'},hurigi:{name:'ティフリギ（後ろ回し蹴り）',dur:.68,hit:.43,range:126,dmg:96,bal:38,type:'high'}};
class Fighter{constructor(x,color,face,ai=false){Object.assign(this,{x,y:0,vx:0,face,color,ai,hp:1000,bal:100,act:'idle',t:0,move:null,hitDone:false,rotWindow:0,guard:false,cool:0})}step(dir){if(this.act==='idle'||this.act==='walk'){this.act=dir===this.face?'stepIn':'backStep';this.t=.22;this.vx=dir*950}}rotate(){if(this.act==='idle'||this.act==='walk'){this.act='rotate';this.t=.34;this.rotWindow=.34;this.move=null;show('回転フェイント')}}kick(btn){if(this.act==='rotate'||this.rotWindow>0){this.start(btn==='small'?'dwit':'hurigi');return}if(this.act!=='idle'&&this.act!=='walk')return;let back=(this.face===1&&keys.left)||(this.face===-1&&keys.right);let m=btn==='small'?'small':'big';if(keys.up)m=btn==='small'?'naeryo':'jumpSpin';else if(back)m=btn==='small'?'backRound':'backDwit';this.start(m)}start(m){this.move=moves[m];this.act='kick';this.t=this.move.dur;this.hitDone=false;if(m==='backRound'||m==='backDwit')this.vx=-this.face*260;show(this.move.name)}update(dt,enemy){this.y=H-132;this.face=this.x<enemy.x?1:-1;this.guard=keys.guard&&!this.ai&&(this.act==='idle'||this.act==='walk');if(this.ai)this.aiThink(dt,enemy);if(this.act==='idle'||this.act==='walk'){let mv=(this.ai?0:(keys.right?1:0)-(keys.left?1:0));this.vx=mv*250;this.act=mv?'walk':'idle'}this.x+=this.vx*dt;this.vx*=Math.pow(.06,dt);this.x=Math.max(60,Math.min(W-60,this.x));if(this.rotWindow>0)this.rotWindow-=dt;if(this.t>0){let prev=this.t;this.t-=dt;if(this.act==='kick'&&this.move&&!this.hitDone&&prev>this.move.dur-this.move.hit&&this.t<=this.move.dur-this.move.hit){this.tryHit(enemy);this.hitDone=true}if(this.t<=0){this.act='idle';this.move=null;this.vx=0}}this.bal=Math.min(100,this.bal+8*dt)}aiThink(dt,enemy){this.cool-=dt;if(this.cool>0)return;let d=Math.abs(enemy.x-this.x);if(d>180){this.vx=this.face*160;this.act='walk'}else if(d<70){this.step(-this.face);this.cool=.55}else{let r=Math.random();if(r<.22)this.rotate(),this.cool=.35;else if(r<.47)this.start('small'),this.cool=.75;else if(r<.68)this.start('big'),this.cool=.95;else if(r<.84)this.start('dwit'),this.cool=1.0;else this.guard=true,this.cool=.45}}tryHit(enemy){let d=Math.abs(enemy.x-this.x);if(d<this.move.range+26){let gd=enemy.guard||enemy.act==='guard';let dmg=this.move.dmg*(gd?.25:1);enemy.hp=Math.max(0,enemy.hp-dmg);enemy.bal=Math.max(0,enemy.bal-this.move.bal*(gd?.45:1));enemy.vx=this.face*(gd?70:230);if(enemy.bal<=0){enemy.vx=this.face*420;enemy.bal=45;show('体勢崩れ！')}show((gd?'ガード！ ':'ヒット！ ')+this.move.name)}}draw(){ctx.save();ctx.translate(this.x,this.y);ctx.scale(this.face,1);let c=this.color,skin='#ffd7aa',line='#111';ctx.lineWidth=5;ctx.lineCap='round';ctx.strokeStyle=line;ctx.fillStyle=c;let phase=this.move?this.move.name:'';let rot=this.act==='rotate'||phase.includes('ティッ')||phase.includes('後ろ回し');let kick=this.act==='kick';let guard=this.guard;let bodyLean=rot?-0.25:0;ctx.rotate(bodyLean); // legs
function limb(x1,y1,x2,y2,col){ctx.strokeStyle=line;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.strokeStyle=col;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.lineWidth=5}
let legY=0;if(kick&&phase.includes('ティッチャギ')){limb(0,-50,100,-82,c);limb(100,-82,162,-86,c);limb(-6,-48,-28,0,c)}else if(kick&&phase.includes('ティフリギ')){limb(0,-50,82,-112,c);limb(82,-112,145,-128,c);limb(-8,-48,-25,0,c)}else if(kick&&phase.includes('ネリョ')){limb(0,-50,62,-145,c);limb(62,-145,82,-170,c);limb(-8,-48,-25,0,c)}else if(kick&&phase.includes('跳び後ろ回し')){limb(0,-50,95,-120,c);limb(95,-120,150,-112,c);limb(-8,-48,-55,-80,c)}else if(kick){limb(0,-50,70,-72,c);limb(70,-72,125,-72,c);limb(-8,-48,-25,0,c)}else{limb(-12,-48,-28,0,c);limb(15,-48,30,0,c)}ctx.fillStyle=c;ctx.strokeStyle=line;ctx.beginPath();ctx.roundRect(-28,-112,56,66,12);ctx.fill();ctx.stroke();ctx.fillStyle=skin;ctx.beginPath();ctx.arc(0,-145,22,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(7,-150,3,0,7);ctx.fill();ctx.beginPath();ctx.arc(16,-150,3,0,7);ctx.fill();ctx.strokeStyle=line;if(guard){limb(8,-102,38,-132,c);limb(-8,-100,26,-124,c)}else{limb(22,-100,50,-90,c);limb(-22,-100,-42,-84,c)}ctx.fillStyle='#111';ctx.fillRect(-31,-72,62,7);if(rot){ctx.strokeStyle='rgba(255,230,0,.9)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-82,56,0.1,4.7);ctx.stroke()}ctx.restore()}}
let player=new Fighter(W*.28,'#1565d8',1,false),cpu=new Fighter(W*.72,'#d92d2d',-1,true);let time=60,last=performance.now(),msgTime=0;function show(s){document.getElementById('msg').textContent=s;msgTime=1.4}
function drawStage(){ctx.fillStyle='#6bd4ff';ctx.fillRect(0,0,W,H);ctx.fillStyle='#8bd36b';for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(i*260+80,H*.50,180,Math.PI,0);ctx.fill()}ctx.fillStyle='#273d72';ctx.fillRect(0,H-155,W,155);ctx.fillStyle='#31549f';for(let x=0;x<W;x+=40)ctx.fillRect(x,H-155,2,155);for(let y=H-155;y<H;y+=28)ctx.fillRect(0,y,W,2);ctx.fillStyle='#b23434';ctx.fillRect(0,H-158,W,8)}
function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;time=Math.max(0,time-dt);player.update(dt,cpu);cpu.update(dt,player);drawStage();player.draw();cpu.draw();document.getElementById('php').style.width=player.hp/10+'%';document.getElementById('ehp').style.width=cpu.hp/10+'%';document.getElementById('pbal').style.width=player.bal+'%';document.getElementById('ebal').style.width=cpu.bal+'%';document.getElementById('timer').textContent=Math.ceil(time);if(msgTime>0)msgTime-=dt;else document.getElementById('msg').textContent='';if(player.hp<=0||cpu.hp<=0||time<=0){show(player.hp>cpu.hp?'PLAYER WIN!':player.hp<cpu.hp?'CPU WIN!':'DRAW');time=60;player.hp=cpu.hp=1000;player.bal=cpu.bal=100;player.x=W*.28;cpu.x=W*.72}requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script>
</body></html>
